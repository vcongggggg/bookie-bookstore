{% extends "base.html" %}
{% block title %}Chỉnh sửa tài khoản - Bookie{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="white-panel fade-up">
            <h2 class="fw-bold mb-4" style="font-size:1.5rem">
                <i class="bi bi-pencil-square me-2" style="color:var(--primary)"></i>Chỉnh sửa thông tin
            </h2>
            <form method="post">
                {% csrf_token %}
                {% for field in form %}
                <div class="mb-3">
                    <label for="{{ field.id_for_label }}" class="form-label fw-600">{{ field.label }}</label>
                    {{ field }}
                    {% if field.errors %}<div class="text-danger small mt-1">{{ field.errors.0 }}</div>{% endif %}
                </div>
                {% endfor %}
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-gradient"><i class="bi bi-check-lg me-1"></i>Lưu thay đổi</button>
                    <a href="{% url 'profile' %}" class="btn btn-glass">Hủy</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
