<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Bookie{% endblock %}</title>
</head>
<body style="margin:0;padding:0;background-color:#F7F2EA;font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;">
<table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background-color:#F7F2EA;">
<tr>
<td align="center" style="padding:30px 15px;">
<table role="presentation" width="600" cellspacing="0" cellpadding="0" style="max-width:600px;width:100%;background-color:#FFFCF7;border-radius:16px;overflow:hidden;box-shadow:0 12px 28px rgba(45,42,38,.12);">

<!-- Header -->
<tr>
<td style="background:linear-gradient(135deg,#2D2A26 0%,#6B5E52 100%);padding:28px 32px;text-align:center;">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0">
    <tr>
    <td align="center">
        <span style="display:inline-block;width:40px;height:40px;border-radius:10px;background:linear-gradient(135deg,#C05621,#D69E2E);text-align:center;line-height:40px;font-size:18px;color:#fff;margin-right:12px;vertical-align:middle;">📖</span>
        <span style="font-size:24px;font-weight:700;color:#fff;letter-spacing:.4px;vertical-align:middle;">Bookie</span>
    </td>
    </tr>
    </table>
</td>
</tr>

<!-- Body -->
<tr>
<td style="padding:32px;">
    {% block content %}{% endblock %}
</td>
</tr>

<!-- Footer -->
<tr>
<td style="background-color:#f3f0ea;padding:24px 32px;text-align:center;border-top:1px solid #E6DED3;">
    <p style="margin:0 0 8px;font-size:13px;color:#8A7E73;">
        Email này được gửi tự động từ <strong>Bookie — Smart Bookstore</strong>.
    </p>
    <p style="margin:0;font-size:12px;color:#a89e93;">
        Bạn nhận được email này vì đã đăng ký tài khoản tại Bookie.
    </p>
</td>
</tr>

</table>
</td>
</tr>
</table>
</body>
</html>
