{% extends "base.html" %}
{% block title %}Quên mật khẩu - Smart Bookstore{% endblock %}
{% block content %}
<div class="row justify-content-center align-items-center" style="min-height:60vh">
    <div class="col-md-5">
        <div class="white-panel fade-up" style="padding:2.5rem">
            <div class="text-center mb-4">
                <div style="width:64px;height:64px;border-radius:50%;background:var(--gradient-2);display:inline-flex;align-items:center;justify-content:center;color:#fff;font-size:1.5rem;margin-bottom:1rem">
                    <i class="bi bi-envelope-at"></i>
                </div>
                <h2 class="fw-bold" style="font-size:1.5rem">Quên mật khẩu</h2>
                <p style="color:var(--text-muted);font-size:.9rem">Nhập email đã đăng ký để nhận liên kết đặt lại mật khẩu.</p>
            </div>
            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label for="id_email" class="form-label fw-600">Email</label>
                    <div class="input-group">
                        <span class="input-group-text" style="border-radius:var(--radius-sm) 0 0 var(--radius-sm);border:2px solid var(--border);border-right:none;background:var(--bg-body)"><i class="bi bi-envelope" style="color:var(--text-muted)"></i></span>
                        <input type="email" name="email" id="id_email" class="form-control" style="border-left:none" required autofocus placeholder="Nhập email của bạn">
                    </div>
                </div>
                <button type="submit" class="btn btn-gradient w-100 py-2 mb-3"><i class="bi bi-send me-1"></i>Gửi liên kết đặt lại</button>
            </form>
            <div class="text-center">
                <a href="{% url 'login' %}" class="fw-bold" style="color:var(--primary);text-decoration:none"><i class="bi bi-arrow-left me-1"></i>Quay lại đăng nhập</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
