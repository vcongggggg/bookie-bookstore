{% extends "base.html" %}
{% block title %}Liên hệ - Bookie{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="white-panel fade-up" style="padding:2.5rem">
            <div class="text-center mb-4">
                <div style="width:80px;height:80px;border-radius:50%;background:var(--gradient-3);display:inline-flex;align-items:center;justify-content:center;color:#fff;font-size:2rem;margin-bottom:1rem">
                    <i class="bi bi-headset"></i>
                </div>
                <h1 class="fw-bold" style="font-size:2rem">Liên hệ với chúng tôi</h1>
                <p style="color:var(--text-muted);font-size:1.05rem">Chúng tôi luôn sẵn sàng hỗ trợ bạn!</p>
            </div>
            <div class="row g-4">
                <div class="col-md-4">
                    <div class="text-center p-4" style="background:var(--bg-body);border-radius:var(--radius)">
                        <i class="bi bi-envelope-fill" style="font-size:2rem;color:var(--primary)"></i>
                        <h6 class="fw-bold mt-2 mb-1">Email</h6>
                        <p class="small mb-0" style="color:var(--text-muted)">support@smartbookstore.vn</p>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="text-center p-4" style="background:var(--bg-body);border-radius:var(--radius)">
                        <i class="bi bi-telephone-fill" style="font-size:2rem;color:var(--success)"></i>
                        <h6 class="fw-bold mt-2 mb-1">Hotline</h6>
                        <p class="small mb-0" style="color:var(--text-muted)">1900 xxxx</p>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="text-center p-4" style="background:var(--bg-body);border-radius:var(--radius)">
                        <i class="bi bi-clock-fill" style="font-size:2rem;color:var(--accent)"></i>
                        <h6 class="fw-bold mt-2 mb-1">Giờ làm việc</h6>
                        <p class="small mb-0" style="color:var(--text-muted)">8:00 - 22:00 (T2 - CN)</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
