{% extends "base.html" %}
{% block title %}Mật khẩu đã được đặt lại - Smart Bookstore{% endblock %}
{% block content %}
<div class="row justify-content-center align-items-center" style="min-height:60vh">
    <div class="col-md-5">
        <div class="white-panel fade-up text-center" style="padding:2.5rem">
            <div style="width:64px;height:64px;border-radius:50%;background:var(--gradient-3);display:inline-flex;align-items:center;justify-content:center;color:#fff;font-size:1.5rem;margin-bottom:1rem">
                <i class="bi bi-shield-check"></i>
            </div>
            <h2 class="fw-bold" style="font-size:1.5rem">Đặt lại mật khẩu thành công!</h2>
            <p style="color:var(--text-secondary);font-size:.95rem;line-height:1.7;margin-top:1rem">
                Mật khẩu của bạn đã được thay đổi. Bạn có thể đăng nhập bằng mật khẩu mới.
            </p>
            <a href="{% url 'login' %}" class="btn btn-gradient mt-3"><i class="bi bi-box-arrow-in-right me-1"></i>Đăng nhập ngay</a>
        </div>
    </div>
</div>
{% endblock %}
