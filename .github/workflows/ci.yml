name: Bookie CI

on:
  push:
    branches:
      - main
      - "feature/**"
      - "feat/**"
      - "fix/**"
      - "chore/**"
      - "docs/**"
      - "testing/**"
      - "upgrade/**"
      - "security/**"
      - "hardening/**"
  pull_request:
    branches:
      - main

jobs:
  backend:
    name: Backend Tests And Coverage
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Project

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: Project/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Django system check
        env:
          USE_SQLITE_FOR_TESTS: "1"
        run: python manage.py check

      - name: Run tests with coverage
        env:
          USE_SQLITE_FOR_TESTS: "1"
        run: |
          coverage run --source=books --omit="*/migrations/*,*/tests.py,*/test_*.py" manage.py test books
          coverage report --fail-under=65
          coverage xml -o coverage.xml

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: Project/coverage.xml

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Project

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: Project/requirements.txt

      - name: Install scanner dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pip-audit bandit

      - name: Dependency audit
        run: pip-audit -r requirements.txt

      - name: Static security scan
        run: |
          bandit -r books/ bookstore/ \
            -x "*/tests.py,*/test_*.py,*/migrations/*" \
            -s B101 \
            -f txt \
            --severity-level medium

      - name: Validate env template does not contain obvious real secrets
        run: |
          if grep -qiE '(sk-|ghp_|AKIA|real-secret|BEGIN PRIVATE KEY)' .env.example; then
            echo "Potential real secret found in .env.example"
            exit 1
          fi

  e2e:
    name: Playwright Smoke Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Project

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: Project/requirements.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Project/package-lock.json

      - name: Install Node dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run Playwright smoke suite
        env:
          USE_SQLITE_FOR_TESTS: "1"
        run: npm run test:e2e:smoke -- --project=chromium-desktop --project=chromium-mobile

      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            Project/playwright-report
            Project/test-results

  docker:
    name: Docker Compose Validation
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Project

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate compose config
        run: docker compose config --quiet

      - name: Build web and worker images
        run: docker compose build web worker
